<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPath Pro | Login</title>
    <style>
        :root {
            --bg: #05070a;
            --accent: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #05070a 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        h1 span { color: var(--accent); }
        p { color: #94a3b8; margin-bottom: 2rem; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        .guest-link {
            margin-top: 1.5rem;
            display: block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .guest-link:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Skill<span>Path</span></h1>
        <p>Your AI-Powered Learning Hub</p>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Full Name">
            <input type="password" placeholder="Password (Optional for Demo)">
            <button type="submit" class="btn-primary">Initialize Session</button>
        </form>

        <span class="guest-link" id="guestBtn">Continue as Guest Explorer</span>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const guestBtn = document.getElementById('guestBtn');

        function start(name) {
            localStorage.setItem('user_name', name || "Guest Explorer");
            window.location.href = 'dashboard.html';
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            start(document.getElementById('username').value);
        };

        guestBtn.onclick = () => start("");
    </script>
</body>
</html>
