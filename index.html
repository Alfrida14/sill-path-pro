<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnPath | Login</title>
    <style>
        :root {
            --bg-black: #0d0d12;
            --card-bg: #16161e;
            --border: #24242e;
            --text-dim: #6c6c7e;
            --accent-purple: #8b5cf6;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container { width: 100%; max-width: 400px; padding: 20px; }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-center {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 1.5rem; font-weight: bold; margin-bottom: 30px;
        }

        .logo-dot { width: 12px; height: 12px; background: var(--accent-purple); border-radius: 50%; }

        .login-subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }

        .input-group label {
            display: block; font-size: 0.75rem; font-weight: bold;
            color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;
        }

        .input-group input {
            width: 100%; background: #0d0d12; border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white; outline: none;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%; background: var(--accent-purple); color: white;
            border: none; padding: 14px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: 10px;
        }

        .login-btn:hover { opacity: 0.9; }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-center">
                <div class="logo-dot"></div>
                <span>LearnPath</span>
            </div>
            <h2>Welcome back</h2>
            <p class="login-subtitle">Enter your details to access your dashboard</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="username" placeholder="e.g. Arjun Mehra" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. Get the name exactly as typed
        const typedName = document.getElementById('username').value;

        // 2. FORCE SAVE to localStorage
        localStorage.setItem('activeUser', typedName);

        // 3. DEBUG: Check if it actually saved before leaving the page
        console.log("Saving name:", localStorage.getItem('activeUser'));

        // 4. Redirect to the dashboard
        window.location.href = 'dashboard.html';
    });
</script>
</body>
</html>
